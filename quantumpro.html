<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantumStudio Pro | Enterprise Design & Development Workspace</title>
<style>
:root {
--bg-primary: #121214;
--bg-secondary: #1a1a1e;
--bg-tertiary: #26262b;
--bg-accent: #3b82f6;
--bg-accent-hover: #2563eb;
--text-primary: #f3f4f6;
--text-secondary: #9ca3af;
--text-muted: #6b7280;
--border-color: #2d2d34;
--sidebar-width: 280px;
--toolbar-height: 48px;
--accent-green: #10b981;
--accent-purple: #8b5cf6;
--font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
[data-theme="light"] {
--bg-primary: #ffffff;
--bg-secondary: #f9fafb;
--bg-tertiary: #f3f4f6;
--bg-accent: #2563eb;
--bg-accent-hover: #1d4ed8;
--text-primary: #111827;
--text-secondary: #4b5563;
--text-muted: #9ca3af;
--border-color: #e5e7eb;
}
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
body {
font-family: var(--font-stack);
background-color: var(--bg-primary);
color: var(--text-primary);
overflow: hidden;
height: 100vh;
width: 100vw;
display: flex;
flex-direction: column;
}
#app-header {
height: var(--toolbar-height);
background-color: var(--bg-secondary);
border-bottom: 1px solid var(--border-color);
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 16px;
z-index: 100;
}
.brand {
display: flex;
align-items: center;
gap: 8px;
font-weight: 700;
font-size: 14px;
letter-spacing: 0.5px;
background: linear-gradient(45deg, #3b82f6, #8b5cf6);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}
#main-container { flex: 1; display: flex; position: relative; overflow: hidden; }
.sidebar {
width: var(--sidebar-width);
background-color: var(--bg-secondary);
border-right: 1px solid var(--border-color);
display: flex;
flex-direction: column;
z-index: 10;
transition: width 0.2s ease;
position: relative;
}
.sidebar.right { border-right: none; border-left: 1px solid var(--border-color); }
.sidebar-resizer {
width: 4px;
height: 100%;
position: absolute;
right: 0;
top: 0;
cursor: col-resize;
z-index: 20;
}
.panel-header {
padding: 12px 16px;
font-size: 11px;
text-transform: uppercase;
letter-spacing: 1px;
font-weight: 600;
color: var(--text-secondary);
border-bottom: 1px solid var(--border-color);
display: flex;
justify-content: space-between;
align-items: center;
}
#workspace-area {
flex: 1;
position: relative;
background-color: var(--bg-primary);
overflow: hidden;
outline: none;
}
#canvas-container {
position: absolute;
width: 10000px;
height: 10000px;
transform-origin: 0 0;
background-image:
linear-gradient(to right, var(--border-color) 1px, transparent 1px),
linear-gradient(to bottom, var(--border-color) 1px, transparent 1px);
background-size: 20px 20px;
}
.artboard {
position: absolute;
background-color: #ffffff;
box-shadow: 0 10px 30px rgba(0,0,0,0.2);
border-radius: 4px;
overflow: hidden;
}
.artboard-title {
position: absolute;
top: -24px;
left: 0;
font-size: 12px;
color: var(--text-secondary);
font-weight: 500;
}
.floating-toolbar {
position: absolute;
top: 16px;
left: 50%;
transform: translateX(-50%);
background-color: rgba(26, 26, 30, 0.85);
backdrop-filter: blur(12px);
border: 1px solid var(--border-color);
border-radius: 8px;
padding: 6px;
display: flex;
gap: 4px;
z-index: 50;
box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.tool-btn {
background: transparent;
border: none;
color: var(--text-secondary);
padding: 8px;
border-radius: 6px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.15s ease;
}
.tool-btn:hover, .tool-btn.active {
color: var(--text-primary);
background-color: var(--bg-tertiary);
}
.node-element {
position: absolute;
cursor: move;
box-sizing: border-box;
}
.node-element.selected {
outline: 2px solid var(--bg-accent);
}
.input-field {
background-color: var(--bg-tertiary);
border: 1px solid var(--border-color);
border-radius: 4px;
color: var(--text-primary);
padding: 6px 8px;
font-size: 12px;
width: 100%;
outline: none;
}
.input-field:focus { border-color: var(--bg-accent); }
</style>
</head>
<body>

<div class="brand">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
QUANTUMSTUDIO PRO v2026.1
</div>
<div style="display: flex; gap: 12px; align-items: center;">

<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
</button>

<main id="main-container">

Zoom: <span id="zoom-value">100%</span> | Pan: <span id="pan-value">X: 0, Y: 0</span>

<script>
// ==================== STATE STORE ====================
class QuantumStateStore {
  constructor() {
    this.state = {
      currentTool: 'select',
      zoom: 1,
      panX: 0,
      panY: 0,
      selectedNodeId: null,
      theme: 'dark',
      nodes: [
        { id: 'node-1', type: 'rect', name: 'Header Container', x: 40, y: 40, width: 1120, height: 80, fill: '#1a1a1e', radius: 8 },
        { id: 'node-2', type: 'text', name: 'Brand Title', x: 80, y: 68, width: 400, height: 30, fill: '#f3f4f6', content: 'Enterprise Cloud System', fontSize: 18 }
      ]
    };
    this.listeners = new Set();
  }
  subscribe(cb) { this.listeners.add(cb); return () => this.listeners.delete(cb); }
  dispatch(action, payload) {
    switch(action) {
      case 'SET_TOOL': this.state.currentTool = payload; break;
      case 'UPDATE_PAN_ZOOM':
        if (payload.zoom !== undefined) this.state.zoom = payload.zoom;
        if (payload.panX !== undefined) this.state.panX = payload.panX;
        if (payload.panY !== undefined) this.state.panY = payload.panY;
        break;
      case 'SELECT_NODE': this.state.selectedNodeId = payload; break;
      case 'UPDATE_NODE':
        const idx = this.state.nodes.findIndex(n => n.id === payload.id);
        if (idx !== -1) this.state.nodes[idx] = {...this.state.nodes[idx], ...payload.data};
        break;
      case 'ADD_NODE': this.state.nodes.push(payload); break;
      case 'TOGGLE_THEME':
        this.state.theme = this.state.theme === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', this.state.theme);
        break;
    }
    this.listeners.forEach(cb => cb(this.state));
  }
}
const store = new QuantumStateStore();

// ==================== MAIN ENGINE ====================
class QuantumStudioEngine {
  constructor() {
    this.canvasContainer = document.getElementById('canvas-container');
    this.workspaceArea = document.getElementById('workspace-area');
    this.artboard = document.getElementById('artboard-1');
    this.isPanning = false;
    this.initWorkspaceInteraction();
    this.initPlatformSidebarResizers();
    this.initDataBindings();
    this.initAISynthesisEngine();
    this.renderCanvasTree();
  }

  initWorkspaceInteraction() {
    // Pan
    this.workspaceArea.addEventListener('mousedown', e => {
      if (e.button === 1 || store.state.currentTool === 'pan' || e.target === this.workspaceArea) {
        this.isPanning = true;
        this.startX = e.clientX - store.state.panX;
        this.startY = e.clientY - store.state.panY;
        this.workspaceArea.style.cursor = 'grabbing';
      }
    });

    window.addEventListener('mousemove', e => {
      if (this.isPanning) {
        store.dispatch('UPDATE_PAN_ZOOM', {
          panX: e.clientX - this.startX,
          panY: e.clientY - this.startY
        });
        this.applyTransformMatrix();
      }
    });

    window.addEventListener('mouseup', () => {
      this.isPanning = false;
      this.workspaceArea.style.cursor = 'default';
    });

    // Zoom with mouse cursor centering
    this.workspaceArea.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = this.workspaceArea.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
      const oldZoom = store.state.zoom;
      let newZoom = Math.max(0.1, Math.min(oldZoom * zoomFactor, 5));

      const newPanX = mouseX - (mouseX - store.state.panX) * (newZoom / oldZoom);
      const newPanY = mouseY - (mouseY - store.state.panY) * (newZoom / oldZoom);

      store.dispatch('UPDATE_PAN_ZOOM', { zoom: newZoom, panX: newPanX, panY: newPanY });
      this.applyTransformMatrix();
    }, { passive: false });

    // Tool selection
    document.querySelectorAll('.floating-toolbar button[data-tool]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.floating-toolbar button[data-tool]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        store.dispatch('SET_TOOL', btn.getAttribute('data-tool'));
      });
    });

    // Click to create
    this.artboard.addEventListener('click', e => {
      if (store.state.currentTool === 'select') return;
      const rect = this.artboard.getBoundingClientRect();
      const x = (e.clientX - rect.left - store.state.panX) / store.state.zoom;
      const y = (e.clientY - rect.top - store.state.panY) / store.state.zoom;

      const newNode = {
        id: 'node-' + Date.now(),
        type: store.state.currentTool,
        name: store.state.currentTool.toUpperCase() + ' Element',
        x: Math.round(x - 60),
        y: Math.round(y - 40),
        width: 120,
        height: 80,
        fill: '#3b82f6',
        radius: 6,
        content: store.state.currentTool === 'text' ? 'New Text' : ''
      };
      store.dispatch('ADD_NODE', newNode);
      store.dispatch('SET_TOOL', 'select');
      this.renderCanvasTree();
    });
  }

  applyTransformMatrix() {
    this.canvasContainer.style.transform = `translate(${store.state.panX}px, ${store.state.panY}px) scale(${store.state.zoom})`;
    document.getElementById('zoom-value').textContent = `${Math.round(store.state.zoom * 100)}%`;
    document.getElementById('pan-value').textContent = `X: ${Math.round(store.state.panX)}, Y: ${Math.round(store.state.panY)}`;
  }

  initPlatformSidebarResizers() {
    const setup = (resizerId, sidebarId, isLeft) => {
      const resizer = document.getElementById(resizerId);
      const sidebar = document.getElementById(sidebarId);
      let startW, startX;
      resizer.addEventListener('mousedown', e => {
        startW = sidebar.offsetWidth;
        startX = e.clientX;
        const move = ev => {
          const delta = isLeft ? ev.clientX - startX : startX - ev.clientX;
          const newW = Math.max(180, Math.min(500, startW + delta));
          sidebar.style.width = newW + 'px';
        };
        const stop = () => {
          document.removeEventListener('mousemove', move);
          document.removeEventListener('mouseup', stop);
        };
        document.addEventListener('mousemove', move);
        document.addEventListener('mouseup', stop);
      });
    };
    setup('left-resizer', 'left-sidebar', true);
    setup('right-resizer', 'right-sidebar', false);
  }

  initDataBindings() {
    // Inspector bindings...
    ['inspect-x','inspect-y','inspect-w','inspect-h','inspect-color','inspect-radius'].forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('input', () => {
        if (!store.state.selectedNodeId) return;
        const key = id.replace('inspect-', '').replace('color','fill');
        let val = el.value;
        if (el.type === 'number') val = parseFloat(val) || 0;
        store.dispatch('UPDATE_NODE', { id: store.state.selectedNodeId, data: {[key]: val} });
        this.renderCanvasTree();
      });
    });

    document.getElementById('inspect-color-picker').addEventListener('input', e => {
      document.getElementById('inspect-color').value = e.target.value;
      document.getElementById('inspect-color').dispatchEvent(new Event('input'));
    });

    document.getElementById('theme-toggle').addEventListener('click', () => store.dispatch('TOGGLE_THEME'));
  }

  renderCanvasTree() {
    this.artboard.querySelectorAll('.node-element').forEach(el => el.remove());
    const layersTree = document.getElementById('layers-tree');
    layersTree.innerHTML = '';

    store.state.nodes.forEach(node => {
      const el = document.createElement('div');
      el.className = `node-element ${store.state.selectedNodeId === node.id ? 'selected' : ''}`;
      el.id = `dom-${node.id}`;
      el.style.left = node.x + 'px';
      el.style.top = node.y + 'px';
      el.style.width = node.width + 'px';
      el.style.height = node.height + 'px';
      el.style.backgroundColor = node.fill || '#3b82f6';
      el.style.borderRadius = (node.radius || 0) + 'px';

      if (node.type === 'text') {
        el.textContent = node.content || '';
        el.style.color = node.fill;
        el.style.backgroundColor = 'transparent';
      }

      // Drag node
      el.addEventListener('mousedown', e => {
        e.stopPropagation();
        store.dispatch('SELECT_NODE', node.id);
        this.updateInspectorValues(node);

        let startX = node.x, startY = node.y;
        const ox = e.clientX, oy = e.clientY;

        const onMove = ev => {
          const dx = (ev.clientX - ox) / store.state.zoom;
          const dy = (ev.clientY - oy) / store.state.zoom;
          store.dispatch('UPDATE_NODE', {id: node.id, data: {x: Math.round(startX + dx), y: Math.round(startY + dy)}});
          this.renderCanvasTree();
        };
        const onUp = () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      });

      this.artboard.appendChild(el);

      // Tree item
      const treeEl = document.createElement('div');
      treeEl.className = `tree-item ${store.state.selectedNodeId === node.id ? 'selected' : ''}`;
      treeEl.innerHTML = `<span>${node.name}</span>`;
      treeEl.onclick = () => {
        store.dispatch('SELECT_NODE', node.id);
        this.updateInspectorValues(node);
        this.renderCanvasTree();
      };
      layersTree.appendChild(treeEl);
    });
  }

  updateInspectorValues(node) {
    document.getElementById('inspect-x').value = node.x;
    document.getElementById('inspect-y').value = node.y;
    document.getElementById('inspect-w').value = node.width;
    document.getElementById('inspect-h').value = node.height;
    document.getElementById('inspect-color').value = node.fill || '#3b82f6';
    document.getElementById('inspect-radius').value = node.radius || 0;
  }

  createComponent(type) {
    const node = type === 'Button' 
      ? {id: 'btn-'+Date.now(), type:'rect', name:'Primary Button', x:300, y:200, width:160, height:48, fill:'#10b981', radius:24}
      : {id: 'card-'+Date.now(), type:'rect', name:'Feature Card', x:250, y:180, width:320, height:420, fill:'#26262b', radius:12};
    store.dispatch('ADD_NODE', node);
    this.renderCanvasTree();
  }

  initAISynthesisEngine() {
    const btn = document.getElementById('ai-execute-synthesis');
    const promptEl = document.getElementById('ai-prompt-input');
    const keyEl = document.getElementById('openai-key');
    const feedback = document.getElementById('ai-status-feedback');

    btn.addEventListener('click', async () => {
      const prompt = promptEl.value.trim();
      const apiKey = keyEl.value.trim();

      if (!prompt) return;
      if (!apiKey) {
        feedback.textContent = "Please enter your OpenAI API key";
        feedback.style.color = "#ef4444";
        return;
      }

      feedback.textContent = "Generating with OpenAI...";
      feedback.style.color = "#8b5cf6";

      try {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            temperature: 0.7,
            messages: [{
              role: "system",
              content: "Return ONLY a JSON array of UI nodes. Each node: {id, type:'rect'|'text', name, x, y, width, height, fill, radius?, content?}"
            }, {
              role: "user",
              content: prompt
            }]
          })
        });

        const data = await res.json();
        const content = data.choices[0].message.content;
        const nodes = JSON.parse(content);

        if (Array.isArray(nodes)) {
          nodes.forEach(n => {
            n.id = n.id || 'ai-' + Date.now();
            store.dispatch('ADD_NODE', n);
          });
          this.renderCanvasTree();
          feedback.textContent = `✅ ${nodes.length} elements created!`;
          feedback.style.color = "var(--accent-green)";
        }
      } catch (err) {
        feedback.textContent = "Error: Check API key or network";
        feedback.style.color = "#ef4444";
        console.error(err);
      }
    });
  }

  // ===================== EXPORT =====================
  exportProject() {
    const ts = Date.now();
    const nodes = store.state.nodes;

    // HTML
    let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>QuantumStudio Export</title><style>body{margin:40px;font-family:sans-serif;}.artboard{position:relative;width:1200px;height:800px;background:#fff;border:1px solid #ddd;margin:0 auto;}`;
    nodes.forEach(n => {
      html += `.node-${n.id}{position:absolute;left:${n.x}px;top:${n.y}px;width:${n.width}px;height:${n.height}px;background:${n.fill};border-radius:${n.radius||0}px;${n.type==='text'?`color:${n.fill};display:flex;align-items:center;justify-content:center;font-size:${n.fontSize||14}px;`:''}}`;
    });
    html += `</style></head><body><div class="artboard">`;
    nodes.forEach(n => {
      html += n.type === 'text' 
        ? `<div class="node-${n.id}">${n.content||''}</div>`
        : `<div class="node-${n.id}"></div>`;
    });
    html += `</div></body></html>`;

    // CSS
    let css = `/* QuantumStudio Generated CSS */\n.artboard { position: relative; width: 1200px; height: 800px; background: white; margin: 40px auto; border: 1px solid #ddd; }\n`;
    nodes.forEach(n => {
      css += `.node-${n.id} { position: absolute; left: ${n.x}px; top: ${n.y}px; width: ${n.width}px; height: ${n.height}px; background: ${n.fill}; border-radius: ${n.radius||0}px; ${n.type==='text' ? `color: ${n.fill}; font-size: ${n.fontSize||14}px;` : ''} }\n`;
    });

    // JS (basic interactivity)
    const js = `// QuantumStudio Generated JS\nconsole.log("QuantumStudio Project Loaded");`;

    // Download all
    this.download(`index-${ts}.html`, html, 'text/html');
    this.download(`styles-${ts}.css`, css, 'text/css');
    this.download(`app-${ts}.js`, js, 'text/javascript');
    this.download(`project-${ts}.json`, JSON.stringify(store.state, null, 2), 'application/json');
  }

  download(filename, content, type) {
    const blob = new Blob([content], {type});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }
}

// Initialize
let studioEngine;
window.addEventListener('DOMContentLoaded', () => {
  studioEngine = new QuantumStudioEngine();
  document.getElementById('export-entire-project').addEventListener('click', () => studioEngine.exportProject());
});
</script>
